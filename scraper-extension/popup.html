<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f1a; --card: #1a1a2e; --surface: #232340;
      --border: #2a2a4a; --text: #e8e8f0; --muted: #7878a0;
      --accent: #6c63ff; --accent2: #4834d4;
      --success: #2ecc71; --error: #e74c3c; --warn: #f39c12;
      --info: #54a0ff; --discord: #5865F2; --gold: #ffd700;
    }
    body {
      width: 520px; min-height: 450px;
      font-family: 'Inter', -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text); font-size: 13px;
    }
    .container { padding: 10px; }

    .title-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 2px 10px; border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .title-bar h1 { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
    .title-bar .icon { font-size: 16px; }

    .tabs {
      display: flex; gap: 2px; margin-bottom: 10px;
      background: var(--card); border-radius: 8px; padding: 3px;
    }
    .tab {
      flex: 1; padding: 6px 0; text-align: center; border: none;
      border-radius: 6px; background: transparent; color: var(--muted);
      cursor: pointer; font-size: 11px; font-weight: 500; transition: all 0.2s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { background: var(--accent); color: #fff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: var(--muted); margin-bottom: 8px;
    }
    .dot {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; margin-right: 4px;
    }
    .dot.green { background: var(--success); box-shadow: 0 0 6px rgba(46,204,113,0.5); }
    .dot.red { background: var(--error); box-shadow: 0 0 6px rgba(231,76,60,0.5); }
    .dot.yellow { background: var(--warn); box-shadow: 0 0 6px rgba(243,156,18,0.5); }

    .btn {
      padding: 8px 14px; border: none; border-radius: 6px;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
      display: inline-flex; align-items: center; justify-content: center; gap: 5px;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; width: 100%; padding: 10px; font-size: 13px; }
    .btn-primary:hover:not(:disabled) { filter: brightness(1.1); }
    .btn-danger { background: #2c1a1a; color: var(--error); }
    .btn-danger:hover:not(:disabled) { background: #3d2020; }
    .btn-success { background: #0f2a1a; color: var(--success); }
    .btn-success:hover:not(:disabled) { background: #153d27; }
    .btn-discord { background: #1a1d3d; color: var(--discord); }
    .btn-discord:hover:not(:disabled) { background: #232850; }
    .btn-warn { background: #2a2010; color: var(--warn); }
    .btn-warn:hover:not(:disabled) { background: #3d3018; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-outline:hover { border-color: var(--accent); color: var(--text); }
    .btn-sm { padding: 4px 8px; font-size: 10px; }
    .btn-tiny { padding: 2px 5px; font-size: 9px; }
    .row { display: flex; gap: 5px; align-items: center; }
    .row > * { flex: 1; }

    .card { background: var(--card); border-radius: 6px; padding: 8px; margin-bottom: 4px; border: 1px solid var(--border); }
    .scroll-box { max-height: 280px; overflow-y: auto; border-radius: 6px; }
    .scroll-box::-webkit-scrollbar { width: 3px; }
    .scroll-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .progress-wrap { background: var(--card); border-radius: 6px; padding: 6px 10px; margin-bottom: 6px; display: none; }
    .progress-wrap.active { display: block; }
    .progress-info { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 4px; }
    .progress-bar { height: 4px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--info)); border-radius: 3px; transition: width 0.3s ease; width: 0%; }
    .progress-fill.indeterminate { width: 30%; animation: slide 1.5s ease-in-out infinite; }
    @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }

    .prop-item { display: flex; align-items: center; gap: 5px; padding: 3px 4px; border-radius: 4px; font-size: 11px; border-bottom: 1px solid var(--border); }
    .prop-item:last-child { border-bottom: none; }
    .prop-item input[type="checkbox"] { accent-color: var(--accent); flex-shrink: 0; width: 12px; height: 12px; cursor: pointer; }
    .prop-item .info { flex: 1; min-width: 0; }
    .prop-item .title { font-weight: 500; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
    .prop-item .title:hover { color: var(--accent); }
    .prop-item .meta { font-size: 9px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .prop-item .pin { cursor: pointer; font-size: 11px; opacity: 0.4; transition: opacity 0.15s; flex-shrink: 0; }
    .prop-item .pin:hover, .prop-item .pin.active { opacity: 1; }
    .prop-item .pin.active { color: var(--gold); }

    .prop-detail { display: none; font-size: 10px; padding: 6px 8px; background: var(--surface); border-radius: 4px; margin: 2px 0 4px 20px; }
    .prop-detail.open { display: block; }
    .prop-detail .field { display: flex; padding: 1px 0; gap: 6px; }
    .prop-detail .field .lbl { color: var(--muted); min-width: 60px; flex-shrink: 0; }
    .prop-detail .field .val { color: var(--text); }

    .search-bar { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--text); font-size: 11px; }
    .search-bar:focus { outline: none; border-color: var(--accent); }

    .checkbox-label { display: flex; align-items: center; gap: 5px; font-size: 11px; cursor: pointer; }
    .checkbox-label input { accent-color: var(--accent); }

    .toast { position: fixed; bottom: 10px; left: 10px; right: 10px; padding: 6px 10px; border-radius: 6px; font-size: 10px; display: none; z-index: 100; text-align: center; }
    .toast.show { display: block; }
    .toast.success { background: #0f2a1a; color: var(--success); border: 1px solid #1a4a2a; }
    .toast.error { background: #2c1a1a; color: var(--error); border: 1px solid #4a2020; }

    .text-muted { color: var(--muted); }
    .text-sm { font-size: 10px; }
    .text-xs { font-size: 9px; }
    .mt-1 { margin-top: 5px; }
    .mb-1 { margin-bottom: 5px; }
    .flex { display: flex; }
    .flex-1 { flex: 1; }
    .items-center { align-items: center; }
    .c-pointer { cursor: pointer; }
    .gap-1 { gap: 4px; }
    .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .badge { display: inline-block; background: var(--accent); color: #fff; font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
    .badge-gold { background: var(--gold); color: #000; }
    .badge-success { background: var(--success); color: #000; }

    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tag { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; background: var(--surface); color: var(--muted); }

    .settings label { display: block; font-size: 10px; color: var(--muted); margin: 5px 0 2px; }
    .settings input, .settings select { width: 100%; padding: 5px 7px; border: 1px solid var(--border); border-radius: 4px; background: var(--card); color: var(--text); font-size: 10px; }
    .settings input:focus { outline: none; border-color: var(--accent); }
    .settings select { cursor: pointer; }

    .preset-item { display: flex; align-items: center; gap: 4px; padding: 3px 6px; border-radius: 4px; font-size: 10px; cursor: pointer; }
    .preset-item:hover { background: var(--surface); }
    .preset-item .del { color: var(--error); opacity: 0.6; cursor: pointer; }
    .preset-item .del:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-bar">
      <span class="icon">🏠</span>
      <h1>99acres Scraper</h1>
      <span class="badge" id="liveCount" style="display:none;">0</span>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="scrape">Scrape</button>
      <button class="tab" data-tab="history">History</button>
      <button class="tab" data-tab="pins">Pins</button>
      <button class="tab" data-tab="settings">Settings</button>
    </div>

    <!-- SCRAPE TAB -->
    <div class="tab-content active" id="tab-scrape">
      <div class="status-bar">
        <span><span class="dot yellow" id="statusDot"></span><span id="statusText">Checking...</span></span>
        <span id="pageType" class="text-muted tag"></span>
      </div>

      <div class="row" style="gap:4px;">
        <button class="btn btn-primary" id="scrapeBtn" disabled style="flex:3;">
          <span id="btnIcon">&#9654;</span>
          <span id="btnText">Scrape</span>
        </button>
        <button class="btn btn-danger" id="stopBtn" style="flex:1;display:none;">■ Stop</button>
      </div>

      <div class="row" style="margin-top:5px;gap:6px;flex-wrap:wrap;">
        <label class="checkbox-label"><input type="checkbox" id="autoScrollCheck" checked>Auto-scroll</label>
        <label class="checkbox-label"><input type="checkbox" id="imageDownloadCheck">Images</label>
        <input type="text" class="search-bar" id="keywordInput" placeholder="Match ALL: 3 BHK, Mumbai, 1000 sqft" style="flex:2;margin-bottom:0;font-size:10px;">
      </div>

      <!-- Filter presets -->
      <div class="row" style="margin-top:3px;gap:4px;flex-wrap:wrap;" id="presetBar">
        <span class="text-xs text-muted">Presets:</span>
        <select id="presetSelect" style="flex:1;padding:2px 4px;font-size:9px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:4px;">
          <option value="">— Save/load filters —</option>
        </select>
        <button class="btn btn-tiny btn-outline" id="savePresetBtn" title="Save current keywords">+</button>
        <button class="btn btn-tiny btn-danger" id="delPresetBtn" title="Delete selected preset" style="display:none;">✕</button>
      </div>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-info">
          <span id="progressLabel">Scraping...</span>
          <span id="progressCount">0 found</span>
        </div>
        <div class="progress-bar"><div class="progress-fill indeterminate" id="progressFill"></div></div>
      </div>

      <div id="resultArea" style="display:none;">
        <div class="flex items-center" style="justify-content:space-between;margin-bottom:3px;">
          <span class="text-muted text-sm">Properties</span>
          <span class="text-muted text-xs c-pointer" id="selectAllBtn2" style="display:none;">Select All</span>
        </div>
        <div class="scroll-box" id="resultList" style="max-height:300px;"></div>

        <div id="downloadActions" style="display:none;margin-top:5px;">
          <div class="row" style="gap:4px;">
            <button class="btn btn-success" id="saveHereBtn" style="flex:1;font-weight:700;font-size:11px;">💾 Save Here</button>
            <button class="btn btn-discord" id="sendSelectedBtn" style="flex:1;font-weight:700;font-size:11px;">📤 Discord</button>
          </div>
          <div class="row" style="gap:4px;margin-top:3px;">
            <button class="btn btn-sm btn-outline" id="downloadJsonBtn">JSON</button>
            <button class="btn btn-sm btn-outline" id="downloadCsvBtn">CSV</button>
            <button class="btn btn-sm btn-outline" id="downloadExcelBtn">Excel</button>
            <span class="text-muted text-xs flex items-center" style="gap:3px;"><span id="selectedCount">0</span>/<span id="totalCount">0</span> · <span class="c-pointer" style="color:var(--accent);" id="deselectAllBtn2">clear</span></span>
        </div>
        <div id="debugInfo" class="text-xs text-muted" style="margin-top:2px;display:none;"></div>
        <div id="fallbackBar" class="text-xs text-muted" style="margin-top:2px;display:none;"><span class="c-pointer" style="color:var(--accent);" id="forceRenderBtn">Force re-render</span> · <span class="c-pointer" style="color:var(--accent);" id="testRenderBtn">Test render 10</span> · <span class="c-pointer" style="color:var(--accent);" id="showRawBtn">Show raw JSON</span></div>
      </div>
      </div>
    </div>

    <!-- HISTORY TAB -->
    <div class="tab-content" id="tab-history">
      <div class="flex items-center" style="justify-content:space-between;margin-bottom:5px;">
        <h2 style="font-size:13px;font-weight:600;">History</h2>
        <button class="btn btn-sm btn-danger" id="clearHistoryBtn">Clear</button>
      </div>
      <input type="text" class="search-bar" id="historySearch" placeholder="Search history..." style="margin-bottom:5px;">
      <div class="scroll-box" id="historyList" style="max-height:280px;">
        <div class="text-muted text-sm" style="text-align:center;padding:30px 10px;">No history yet.</div>
      </div>
      <div id="historyActions" style="display:none;margin-top:5px;">
        <div class="row" style="gap:4px;">
          <button class="btn btn-sm btn-success" id="historySaveBtn" style="flex:1;font-weight:600;font-size:10px;">💾 Save</button>
          <button class="btn btn-sm btn-discord" id="historySendBtn" style="flex:1;font-weight:600;font-size:10px;">📤 Discord</button>
        </div>
      </div>
    </div>

    <!-- PINS TAB -->
    <div class="tab-content" id="tab-pins">
      <div class="flex items-center" style="justify-content:space-between;margin-bottom:5px;">
        <h2 style="font-size:13px;font-weight:600;">⭐ Pinned Properties</h2>
      </div>
      <input type="text" class="search-bar" id="pinSearch" placeholder="Search pins..." style="margin-bottom:5px;">
      <div class="scroll-box" id="pinList" style="max-height:300px;">
        <div class="text-muted text-sm" style="text-align:center;padding:30px 10px;">No pins yet. Click ☆ on any property to pin it.</div>
      </div>
      <div class="row" style="margin-top:5px;gap:4px;">
        <button class="btn btn-sm btn-outline" id="exportPinsJsonBtn">Export JSON</button>
        <button class="btn btn-sm btn-outline" id="exportPinsCsvBtn">Export CSV</button>
        <button class="btn btn-sm btn-danger" id="clearPinsBtn" style="flex:0;">Clear All</button>
      </div>
    </div>

    <!-- SETTINGS TAB -->
    <div class="tab-content" id="tab-settings">
      <h2 style="font-size:13px;font-weight:600;margin-bottom:5px;">Settings</h2>
      <div class="settings">
        <label>Errors Webhook</label>
        <input type="url" id="errorWebhook" placeholder="Discord webhook URL">
        <label>Events Webhook</label>
        <input type="url" id="eventWebhook" placeholder="Discord webhook URL">
        <label>Max Scrolls per Page</label>
        <input type="number" id="maxScrolls" min="2" max="50" value="15">
        <label>Max Pages (pagination)</label>
        <input type="number" id="maxPages" min="1" max="20" value="3">
        <button class="btn btn-success" id="saveWebhooksBtn" style="width:100%;margin-top:6px;">Save Settings</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
